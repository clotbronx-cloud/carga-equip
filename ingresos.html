<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresos & Gastos · Moodin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F4F0;--surface:#FFF;--surface2:#EEEDEA;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.17);
  --text:#1A1A18;--text2:#6B6B67;--text3:#9E9E99;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-bd:#97C459;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-bd:#EF9F27;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-bd:#F09595;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:#85B7EB;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:#AFA9EC;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;width:100%;max-width:360px;}
.login-logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;letter-spacing:-.02em;margin-bottom:.25rem;}
.login-logo span{color:var(--text3);}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:1.75rem;}
.login-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.375rem;display:block;}
.login-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;margin-bottom:1rem;}
.login-input:focus{border-color:var(--text);}
.login-btn{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px;border-radius:var(--rs);border:none;background:var(--text);color:var(--surface);cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.85;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-error{font-size:12px;color:var(--red);margin-top:.75rem;text-align:center;min-height:18px;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:-.02em;display:flex;align-items:center;gap:12px;}
.logo span{color:var(--text3);}
.logo a{text-decoration:none;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;}
.logo a:hover{color:var(--text);}
.header-right{display:flex;align-items:center;gap:12px;}
.sync{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;}
.dot.on{background:var(--green);}.dot.saving{background:var(--amber);}
.user-pill{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.logout-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:transparent;color:var(--text2);cursor:pointer;}
.logout-btn:hover{background:var(--surface2);}

/* TABS */
.tabs-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem;position:sticky;top:52px;z-index:199;overflow-x:auto;}
.tnav{font-size:13px;padding:10px 16px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tnav:hover{color:var(--text);}
.tnav.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}

.container{max-width:1300px;margin:0 auto;padding:1.5rem;}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--surface2);}
.divider{border:none;border-top:1px solid var(--border);margin:.5rem 0;}
input[type=text],input[type=number],input[type=date],select{font-family:'DM Sans',sans-serif;font-size:13px;padding:4px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus{border-color:var(--text);}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--text);}
.flabel{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 6px;border-radius:99px;border:1px solid;white-space:nowrap;}
.b-cobrado{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.b-facturado{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.b-pendiente{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.b-retrasado{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.b-fee{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.b-proyecto{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.625rem;margin-bottom:1.5rem;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;}
.mval{font-size:20px;font-weight:500;font-family:'DM Mono',monospace;line-height:1;}
.mval.cg{color:var(--green);}.mval.ca{color:var(--amber);}.mval.cr{color:var(--red);}.mval.cb{color:var(--blue);}
.mlbl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.75rem;margin-bottom:2rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;gap:8px;}
.card-row{display:flex;align-items:center;gap:8px;margin-bottom:.4rem;flex-wrap:wrap;}
.card-row:last-child{margin-bottom:0;}
.del-btn{font-size:11px;padding:2px 7px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;}
.del-btn:hover{border-color:var(--red-bd);color:var(--red);background:var(--red-bg);}
.hitos-section{margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;}
.hito-row{display:flex;align-items:center;gap:6px;margin-bottom:.375rem;flex-wrap:wrap;}
.hito-pct{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;width:32px;}
.add-hito-btn{font-size:11px;padding:2px 8px;border:1px dashed var(--border2);border-radius:var(--rs);background:transparent;color:var(--text3);cursor:pointer;margin-top:4px;}
.add-hito-btn:hover{background:var(--surface2);color:var(--text);}

/* GASTOS TABLE */
.gastos-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.gastos-table{border-collapse:collapse;font-size:13px;width:100%;}
.gastos-table th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;}
.gastos-table th:first-child{text-align:left;}
.gastos-table td{padding:7px 12px;border-bottom:1px solid var(--border);text-align:right;vertical-align:middle;}
.gastos-table td:first-child{text-align:left;}
.gastos-table tr:last-child td{border-bottom:none;}
.gastos-table tr.cat-row td{background:var(--bg);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:5px 12px;border-bottom:none;}
.gastos-table tr.total-row td{background:var(--surface2);font-weight:500;font-family:'DM Mono',monospace;border-top:2px solid var(--border2);}
.gastos-table tr.item-row{cursor:pointer;}
.gastos-table tr.item-row:hover td{background:var(--bg);}
.gastos-table tr.expand-row td{padding:0;border-bottom:1px solid var(--border);}
.expand-inner{padding:.75rem 1rem;background:var(--bg);}
.meses-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.mes-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:5px 8px;}
.mes-item-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.mes-item-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);}
.g-input{width:100%;font-size:12px;padding:3px 6px;text-align:right;border:1px solid var(--border2);border-radius:3px;background:var(--surface);font-family:'DM Mono',monospace;box-sizing:border-box;}
.g-input:focus{border-color:var(--text);outline:none;}
.g-input:disabled{background:var(--surface2);color:var(--text3);border-color:transparent;}
.rec-input{width:110px;font-size:13px;padding:4px 8px;border:1px solid var(--green-bd);border-radius:var(--rs);background:var(--green-bg);color:var(--green);font-family:'DM Mono',monospace;text-align:right;}
.rec-input:focus{outline:none;border-color:var(--green);}
.rec-badge{font-size:9px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);padding:1px 5px;border-radius:99px;white-space:nowrap;}
.th-total{background:var(--surface2) !important;color:var(--text2) !important;}
.expand-arrow{font-size:10px;color:var(--text3);margin-left:6px;transition:transform .2s;}
.expand-arrow.open{transform:rotate(90deg);}

/* PREVISIÓN */
.prev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.625rem;margin-bottom:1.5rem;}
.mes-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;}
.mes-card.actual{border-color:var(--text);border-width:2px;}
.mes-nombre{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:.625rem;}
.mes-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--text2);}
.mes-row span:last-child{font-family:'DM Mono',monospace;font-weight:500;}
.mes-resultado{display:flex;justify-content:space-between;font-size:13px;font-weight:500;font-family:'DM Mono',monospace;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;}
.mes-bar{height:4px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:6px;}
.mes-bar-fill{height:100%;border-radius:99px;}

/* RESUMEN */
.resumen-table{width:100%;border-collapse:collapse;font-size:13px;}
.resumen-table th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.resumen-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.resumen-table tr:last-child td{border-bottom:none;}
.resumen-table tr:hover td{background:var(--bg);}
.mono{font-family:'DM Mono',monospace;}

.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text3);font-size:13px;gap:10px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--surface);font-size:13px;padding:9px 15px;border-radius:var(--rs);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">finanzas<span>/</span>moodin</div>
    <div class="login-sub">Acceso privado</div>
    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="login-email" placeholder="tu@email.com">
    <label class="login-label">Contraseña</label>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-wrap" style="display:none">
  <header>
    <div class="logo">finanzas<span>/</span>moodin <a href="index.html">← Carga de trabajo</a></div>
    <div class="header-right">
      <div class="sync"><div class="dot" id="dot"></div><span id="slbl">Conectando...</span></div>
      <div class="user-pill"><span id="user-email"></span><button class="logout-btn" onclick="doLogout()">Salir</button></div>
    </div>
  </header>
  <nav class="tabs-nav">
    <button class="tnav active" onclick="showTab('prevision',this)">Previsión</button>
    <button class="tnav" onclick="showTab('fees',this)">Fees</button>
    <button class="tnav" onclick="showTab('proyectos',this)">Proyectos</button>
    <button class="tnav" onclick="showTab('gastos',this)">Gastos 2026</button>
    <button class="tnav" onclick="showTab('resumen',this)">Resumen</button>
  </nav>
  <div class="container">
    <div id="data-loading" class="loading"><div class="spinner"></div>Cargando...</div>
    <div id="app" style="display:none">
      <div class="tab-pane active" id="tab-prevision">
        <div class="summary-row" id="summary-prev"></div>
        <div class="section-header"><span class="section-title">Resultado mensual 2026</span></div>
        <div class="prev-grid" id="prev-grid"></div>
      </div>
      <div class="tab-pane" id="tab-fees">
        <div class="section-header">
          <span class="section-title">Fees recurrentes</span>
          <button class="btn" id="btn-add-fee" onclick="addFee()">+ Fee</button>
        </div>
        <div class="cards-grid" id="fees-list"></div>
      </div>
      <div class="tab-pane" id="tab-proyectos">
        <div class="section-header">
          <span class="section-title">Proyectos cerrados</span>
          <button class="btn" id="btn-add-proj" onclick="addProyecto()">+ Proyecto</button>
        </div>
        <div class="cards-grid" id="proyectos-list"></div>
      </div>
      <div class="tab-pane" id="tab-gastos">
        <div class="section-header">
          <span class="section-title">Gastos 2026</span>
          <span style="font-size:12px;color:var(--text3);">Marca "Rec." para repetir automáticamente cada mes</span>
        </div>
        <div id="gastos-container"></div>
      </div>
      <div class="tab-pane" id="tab-resumen">
        <div class="summary-row" id="summary-resumen"></div>
        <div class="section-header" style="margin-bottom:.75rem"><span class="section-title">Clientes</span></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;">
          <table class="resumen-table" id="resumen-table"></table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FB={
  apiKey:"AIzaSyBXgUaOsFPzsMQyhYFAM77dr061gQn9jL8",
  authDomain:"carga-de-treball.firebaseapp.com",
  databaseURL:"https://carga-de-treball-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"carga-de-treball",
  storageBucket:"carga-de-treball.firebasestorage.app",
  messagingSenderId:"183723016420",
  appId:"1:183723016420:web:72e48c81ed2c83ba066cf1"
};

const firebaseApp=initializeApp(FB,'finanzas');
const db=getDatabase(firebaseApp);
const auth=getAuth(firebaseApp);
const dataRef=ref(db,'ingresos1');
const ADMIN_EMAIL='marc@moodin.eu';
const AÑO=2026;
const MESES=['01','02','03','04','05','06','07','08','09','10','11','12'];
const MESES_LABEL=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const CATEGORIAS=[
  {cat:'Personal',items:[
    {key:'socios',label:'Socios'},
    {key:'trabajadores',label:'Trabajadores'},
    {key:'becarios',label:'Becarios'},
  ]},
  {cat:'Servicios profesionales',items:[
    {key:'asesoria',label:'Asesoría contable'},
    {key:'legal',label:'Servicios legales'},
  ]},
  {cat:'Oficina',items:[
    {key:'alquiler',label:'Alquiler oficina'},
    {key:'suministros',label:'Suministros'},
    {key:'material_oficina',label:'Material de oficina'},
    {key:'mobiliario',label:'Mobiliario'},
  ]},
  {cat:'Tecnología',items:[
    {key:'informatico',label:'Material informático'},
    {key:'software',label:'Software y suscripciones'},
    {key:'web',label:'Web y hosting'},
  ]},
  {cat:'Comercial',items:[
    {key:'marketing',label:'Marketing y publicidad'},
    {key:'desplazamientos',label:'Desplazamientos y dietas'},
    {key:'formacion',label:'Formación'},
  ]},
  {cat:'Otros',items:[
    {key:'seguros',label:'Seguros'},
    {key:'cuotas',label:'Cuotas asociaciones'},
    {key:'otros',label:'Otros gastos'},
  ]},
];
const ALL_KEYS=CATEGORIAS.flatMap(c=>c.items.map(i=>i.key));

function defaultGastos(){
  // estructura: gastos[key] = { rec: true/false, recVal: 0, meses: {01:0, 02:0, ...} }
  const g={};
  ALL_KEYS.forEach(key=>{
    g[key]={rec:true,recVal:0,meses:{}};
    MESES.forEach(m=>{g[key].meses[m]=0;});
  });
  return g;
}

const DEFAULT={
  fees:[{id:1,cliente:'Cliente Ejemplo',importe:2500,inicio:'2026-01-01',fin:'2026-12-31',cobros:{}}],
  proyectos:[{id:1,cliente:'Proyecto Ejemplo',importe:12000,inicio:'2026-01-01',fin:'2026-06-30',
    hitos:[
      {id:1,nombre:'Inicio',pct:50,fechaFactura:'2026-01-15',estado:'cobrado'},
      {id:2,nombre:'Cierre',pct:50,fechaFactura:'2026-06-15',estado:'pendiente'},
    ]}],
  gastos:defaultGastos(),
  _fid:2,_prid:2,_hid:10
};

let S=null,saveTO=null,firstData=true,isAdmin=false;
const dot=document.getElementById('dot'),slbl=document.getElementById('slbl');

window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn'),err=document.getElementById('login-error');
  err.textContent='';btn.disabled=true;btn.textContent='Entrando...';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.textContent='Email o contraseña incorrectos';btn.disabled=false;btn.textContent='Entrar';}
};
window.doLogout=async function(){await signOut(auth);};

onAuthStateChanged(auth,user=>{
  if(user){
    isAdmin=user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-wrap').style.display='block';
    document.getElementById('user-email').textContent=user.email;
    if(!isAdmin){['btn-add-fee','btn-add-proj'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});}
    initData();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-wrap').style.display='none';
    S=null;firstData=true;
  }
});

function initData(){
  onValue(dataRef,snap=>{
    const data=snap.val();
    if(firstData){
      firstData=false;
      document.getElementById('data-loading').style.display='none';
      document.getElementById('app').style.display='block';
      sync('on');
      if(!data){S=JSON.parse(JSON.stringify(DEFAULT));if(isAdmin)save();}
      else{S=data;fixState();}
      renderAll();
    } else if(data){S=data;fixState();sync('on');renderAll();}
  });
}

function fixState(){
  S.fees=S.fees||[];S.proyectos=S.proyectos||[];
  if(!S.gastos)S.gastos=defaultGastos();
  // asegurar estructura para cada key
  ALL_KEYS.forEach(key=>{
    if(!S.gastos[key])S.gastos[key]={rec:true,recVal:0,meses:{}};
    if(S.gastos[key].rec===undefined)S.gastos[key].rec=true;
    if(!S.gastos[key].meses)S.gastos[key].meses={};
    MESES.forEach(m=>{if(S.gastos[key].meses[m]===undefined)S.gastos[key].meses[m]=0;});
  });
  S.fees.forEach(f=>{f.cobros=f.cobros||{};});
  S.proyectos.forEach(p=>{p.hitos=p.hitos||[];});
  S._fid=S._fid||20;S._prid=S._prid||20;S._hid=S._hid||100;
}

function sync(s){
  dot.className='dot '+(s==='on'?'on':s==='saving'?'saving':'');
  slbl.textContent=s==='on'?'Sincronizado':s==='saving'?'Guardando...':'Conectando...';
}
function save(){
  if(!isAdmin)return;
  sync('saving');clearTimeout(saveTO);
  saveTO=setTimeout(()=>set(dataRef,S).then(()=>sync('on')).catch(()=>toast('Error al guardar')),700);
}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return Math.round(Number(n)||0).toLocaleString('es-ES');}
function fmtMes(ym){if(!ym)return '';const[y,m]=ym.split('-');return MESES_LABEL[+m-1]+' '+y;}
function mesActual(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function mesesEntre(inicio,fin){
  const out=[];if(!inicio||!fin)return out;
  let[y,m]=inicio.split('-').map(Number);
  const[fy,fm]=fin.split('-').map(Number);
  while(y<fy||(y===fy&&m<=fm)){out.push(y+'-'+String(m).padStart(2,'0'));m++;if(m>12){m=1;y++;}}
  return out;
}

// valor de un concepto en un mes concreto (mm = '01'..'12')
function gastoValMes(key,mm){
  const g=S.gastos[key];if(!g)return 0;
  if(g.rec)return +g.recVal||0;
  return +g.meses[mm]||0;
}

// total gastos un mes ('2026-04')
function gastosMes(ym){
  const[,mm]=ym.split('-');
  return ALL_KEYS.reduce((s,k)=>s+gastoValMes(k,mm),0);
}

/* ── INGRESOS ── */
function calcIngresos(){
  const por={};
  S.fees.forEach(f=>{
    mesesEntre(f.inicio,f.fin).forEach(mes=>{
      if(!por[mes])por[mes]={previsto:0,cobrado:0,facturado:0,pendiente:0};
      const c=f.cobros[mes]||{estado:'pendiente'};
      por[mes].previsto+=+f.importe||0;
      if(c.estado==='cobrado')por[mes].cobrado+=+f.importe||0;
      else if(c.estado==='facturado')por[mes].facturado+=+f.importe||0;
      else por[mes].pendiente+=+f.importe||0;
    });
  });
  S.proyectos.forEach(p=>{
    p.hitos.forEach(h=>{
      const mes=h.fechaFactura?h.fechaFactura.substring(0,7):null;
      const imp=Math.round((+p.importe||0)*(+h.pct||0)/100);
      if(mes){
        if(!por[mes])por[mes]={previsto:0,cobrado:0,facturado:0,pendiente:0};
        por[mes].previsto+=imp;
        if(h.estado==='cobrado')por[mes].cobrado+=imp;
        else if(h.estado==='facturado')por[mes].facturado+=imp;
        else por[mes].pendiente+=imp;
      }
    });
  });
  return por;
}

  btn.classList.add('active');
};

/* ── RENDER PREVISIÓN ── */
function renderPrevision(){
  const ing=calcIngresos();
  const mesesAño=MESES.map(m=>AÑO+'-'+m);
  const actual=mesActual();
  const totalIng=mesesAño.reduce((s,m)=>s+(ing[m]?.previsto||0),0);
  const totalGast=mesesAño.reduce((s,m)=>s+gastosMes(m),0);
  const resultado=totalIng-totalGast;
  const totalCob=mesesAño.reduce((s,m)=>s+(ing[m]?.cobrado||0),0);
  const mesActIng=ing[actual]?.previsto||0;
  const mesActGast=gastosMes(actual);
  const mesActRes=mesActIng-mesActGast;

  document.getElementById('summary-prev').innerHTML=`
    <div class="metric"><div class="mval">${fmt(mesActIng)} €</div><div class="mlbl">Ingresos este mes</div></div>
    <div class="metric"><div class="mval cr">${fmt(mesActGast)} €</div><div class="mlbl">Gastos este mes</div></div>
    <div class="metric"><div class="mval ${mesActRes>=0?'cg':'cr'}">${mesActRes>=0?'+':''}${fmt(mesActRes)} €</div><div class="mlbl">Resultado este mes</div></div>
    <div class="metric"><div class="mval">${fmt(totalIng)} €</div><div class="mlbl">Ingresos 2026</div></div>
    <div class="metric"><div class="mval cr">${fmt(totalGast)} €</div><div class="mlbl">Gastos 2026</div></div>
    <div class="metric"><div class="mval ${resultado>=0?'cg':'cr'}">${resultado>=0?'+':''}${fmt(resultado)} €</div><div class="mlbl">Resultado 2026</div></div>
    <div class="metric"><div class="mval cg">${fmt(totalCob)} €</div><div class="mlbl">Total cobrado</div></div>
  `;

  document.getElementById('prev-grid').innerHTML=mesesAño.map(mes=>{
    const i=ing[mes]||{previsto:0,cobrado:0,facturado:0,pendiente:0};
    const g=gastosMes(mes);
    const res=i.previsto-g;
    const isActual=mes===actual;
    const resCls=res>=0?'cg':'cr';
    const barPct=i.previsto>0?Math.min(100,Math.round((i.cobrado/i.previsto)*100)):0;
    return `<div class="mes-card ${isActual?'actual':''}">
      <div class="mes-nombre">${fmtMes(mes)}${isActual?' · hoy':''}</div>
      <div class="mes-row"><span>Ingresos</span><span>${fmt(i.previsto)} €</span></div>
      <div class="mes-row" style="color:var(--red)"><span>Gastos</span><span>${fmt(g)} €</span></div>
      <div class="mes-resultado"><span>Resultado</span><span class="${resCls}">${res>=0?'+':''}${fmt(res)} €</span></div>
      ${i.cobrado>0?`<div class="mes-bar"><div class="mes-bar-fill" style="width:${barPct}%;background:var(--green);"></div></div>
      <div style="font-size:10px;color:var(--green);margin-top:2px;">✓ ${fmt(i.cobrado)} € cobrado</div>`:''}
    </div>`;
  }).join('');
}

  updateTotalConcepto(key);
  save();renderPrevision();renderResumen();
};

/* ── ACCIONES FEES ── */
window.addFee=function(){if(!isAdmin)return;const h=new Date().toISOString().split('T')[0];S.fees.push({id:S._fid++,cliente:'Nuevo cliente',importe:0,inicio:h,fin:'',cobros:{}});save();renderFees();};
window.removeFee=function(id){if(!isAdmin)return;S.fees=S.fees.filter(f=>f.id!==id);save();renderAll();};
window.updateFee=function(id,k,v){if(!isAdmin)return;const f=S.fees.find(f=>f.id===id);if(f)f[k]=k==='importe'?+v:v;save();renderAll();};
window.updateCobro=function(fid,mes,k,v){if(!isAdmin)return;const f=S.fees.find(f=>f.id===fid);if(!f)return;if(!f.cobros[mes])f.cobros[mes]={estado:'pendiente',fecha:''};f.cobros[mes][k]=v;save();renderAll();};

/* ── ACCIONES PROYECTOS ── */
window.addProyecto=function(){if(!isAdmin)return;const h=new Date().toISOString().split('T')[0];S.proyectos.push({id:S._prid++,cliente:'Nuevo proyecto',importe:0,inicio:h,fin:'',hitos:[{id:S._hid++,nombre:'Inicio',pct:50,fechaFactura:'',estado:'pendiente'},{id:S._hid++,nombre:'Cierre',pct:50,fechaFactura:'',estado:'pendiente'}]});save();renderProyectos();};
window.removeProyecto=function(id){if(!isAdmin)return;S.proyectos=S.proyectos.filter(p=>p.id!==id);save();renderAll();};
window.updateProyecto=function(id,k,v){if(!isAdmin)return;const p=S.proyectos.find(p=>p.id===id);if(p)p[k]=k==='importe'?+v:v;save();renderAll();};
window.addHito=function(prid){if(!isAdmin)return;const p=S.proyectos.find(p=>p.id===prid);if(!p)return;p.hitos.push({id:S._hid++,nombre:'Hito',pct:0,fechaFactura:'',estado:'pendiente'});save();renderProyectos();};
window.removeHito=function(prid,hid){if(!isAdmin)return;const p=S.proyectos.find(p=>p.id===prid);if(!p)return;p.hitos=p.hitos.filter(h=>h.id!==hid);save();renderAll();};
window.updateHito=function(prid,hid,k,v){if(!isAdmin)return;const p=S.proyectos.find(p=>p.id===prid);if(!p)return;const h=p.hitos.find(h=>h.id===hid);if(!h)return;h[k]=k==='pct'?+v:v;save();renderAll();};

function renderAll(){renderPrevision();renderFees();renderProyectos();renderGastos();renderResumen();}
</script>
