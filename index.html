<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carga de Trabajo · Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEEDEA;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --text:#1A1A18;--text2:#6B6B67;--text3:#9E9E99;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-border:#97C459;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-border:#EF9F27;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-border:#F09595;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-border:#85B7EB;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-border:#5DCAA5;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:-0.02em;}
.logo span{color:var(--text3);}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;}
.sync-dot.connected{background:var(--green);}
.sync-dot.saving{background:var(--amber);}
.container{max-width:1100px;margin:0 auto;padding:2rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
@media(max-width:720px){.grid-2{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:2rem;}
.panel-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);}
.panel-body{padding:1rem 1.25rem;}
.item-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem 1rem;margin-bottom:.625rem;background:var(--bg);}
.item-card:last-child{margin-bottom:0;}
.item-row{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;flex-wrap:wrap;}
.item-row:last-child{margin-bottom:0;}
.field-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
input[type=text],input[type=number],select{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 9px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--text);}
input[type=text]{width:150px;}
input[type=number]{width:64px;}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--text);}
.del-btn{margin-left:auto;font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.del-btn:hover{border-color:var(--red-border);color:var(--red);background:var(--red-bg);}
.divider{border:none;border-top:1px solid var(--border);margin:.625rem 0;}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--surface2);}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;border:1px solid;white-space:nowrap;}
.badge-intern{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border);}
.badge-senior{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border);}
.badge-free{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border);}
.badge-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
.badge-warn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.badge-over{background:var(--red-bg);color:var(--red);border-color:var(--red-border);}

/* Tabla de asignación por proyecto */
.assign-table{width:100%;border-collapse:collapse;margin-top:.5rem;font-size:13px;}
.assign-table th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
.assign-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.assign-table tr:last-child td{border-bottom:none;}
.assign-table tr.inactive td{opacity:.4;}
.assign-table input[type=number]{width:58px;}
.assign-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.proj-total{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);}

/* Dashboard */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;}
.metric-val{font-size:26px;font-weight:500;line-height:1;font-family:'DM Mono',monospace;}
.metric-val.c-green{color:var(--green);}.metric-val.c-amber{color:var(--amber);}
.metric-val.c-red{color:var(--red);}.metric-val.c-blue{color:var(--blue);}
.metric-lbl{font-size:11px;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.06em;}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.pc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:12px;}
.pc-name{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;}
.pc-meta{font-size:12px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace;}
.pc-right{text-align:right;flex-shrink:0;}
.pc-pct{font-size:28px;font-weight:300;font-family:'DM Mono',monospace;line-height:1;}
.bar-wrap{margin-bottom:1rem;}
.bar-bg{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.bar-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace;}
.proj-breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
.proj-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .875rem;}
.proj-block-name{font-size:13px;font-weight:500;margin-bottom:.5rem;}
.proj-line{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0;}
.proj-line.total{border-top:1px solid var(--border);margin-top:4px;padding-top:4px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;}
.free-hours{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);background:var(--surface2);border-radius:var(--radius-sm);padding:4px 10px;margin-top:8px;font-family:'DM Mono',monospace;}
.free-hours.highlight{background:var(--green-bg);color:var(--green);}
.empty-state{padding:2rem;text-align:center;color:var(--text3);font-size:13px;}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text3);font-size:13px;gap:10px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--surface);font-size:13px;padding:10px 16px;border-radius:var(--radius-sm);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="logo">carga<span>/</span>equipo</div>
  <div class="sync-indicator">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Conectando...</span>
  </div>
</header>

<div class="container">
  <div id="app-loading" class="loading">
    <div class="spinner"></div>
    Conectando con la base de datos...
  </div>
  <div id="app-content" style="display:none">
    <div class="grid-2">
      <!-- EQUIPO -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Equipo</span>
          <button class="btn" onclick="addPerson()">+ Persona</button>
        </div>
        <div class="panel-body"><div id="people-list"></div></div>
      </div>
      <!-- PROYECTOS -->
      <div class="panel" style="margin-bottom:0">
        <div class="panel-header">
          <span class="panel-title">Proyectos</span>
          <button class="btn" onclick="addProject()">+ Proyecto</button>
        </div>
        <div class="panel-body"><div id="proj-list"></div></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Dashboard de carga semanal</span>
      </div>
      <div class="panel-body">
        <div class="summary-row" id="summary"></div>
        <div id="dashboard"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBXgUaOsFPzsMQyhYFAM77dr061gQn9jL8",
  authDomain: "carga-de-treball.firebaseapp.com",
  databaseURL: "https://carga-de-treball-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "carga-de-treball",
  storageBucket: "carga-de-treball.firebasestorage.app",
  messagingSenderId: "183723016420",
  appId: "1:183723016420:web:72e48c81ed2c83ba066cf1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, 'estado');

// assignations[projectId][personId] = { active, reunCliente, reunInterna, horasDia }
const DEFAULT = {
  people: [
    {id:1, name:'Ana García',   type:'senior', hours:40},
    {id:2, name:'Luis Martín',  type:'senior', hours:40},
    {id:3, name:'María López',  type:'intern',  hours:20},
  ],
  projects: [
    {id:1, name:'Cliente Alfa', assignations:{ 1:{active:true,reunCliente:1,reunInterna:1,horasDia:1.5}, 2:{active:true,reunCliente:1,reunInterna:1,horasDia:1} }},
    {id:2, name:'Cliente Beta', assignations:{ 1:{active:true,reunCliente:1,reunInterna:1,horasDia:1},   3:{active:true,reunCliente:1,reunInterna:0.5,horasDia:0.5} }},
  ],
  _pid:4, _ppid:3,
};

let state = null;
let saveTimeout = null;
let isFirst = true;

const dot = document.getElementById('sync-dot');
const lbl = document.getElementById('sync-label');

function setSync(s) {
  dot.className = 'sync-dot ' + s;
  lbl.textContent = s==='connected'?'Sincronizado': s==='saving'?'Guardando...':'Conectando...';
}

function save() {
  setSync('saving');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    set(dataRef, state)
      .then(()=>setSync('connected'))
      .catch(()=>{ setSync(''); toast('Error al guardar'); });
  }, 600);
}

onValue(dataRef, snap => {
  const data = snap.val();
  if (isFirst) {
    isFirst = false;
    document.getElementById('app-loading').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    setSync('connected');
    if (!data) {
      state = JSON.parse(JSON.stringify(DEFAULT));
      save();
    } else {
      state = data;
      state.people   = state.people   || [];
      state.projects = state.projects || [];
      state.projects.forEach(p => { p.assignations = p.assignations || {}; });
      state._pid  = state._pid  || 10;
      state._ppid = state._ppid || 10;
    }
    renderAll();
  } else if (data) {
    state = data;
    state.people   = state.people   || [];
    state.projects = state.projects || [];
    state.projects.forEach(p => { p.assignations = p.assignations || {}; });
    setSync('connected');
    renderAll();
  }
}, () => {
  document.getElementById('app-loading').innerHTML =
    '<div style="color:var(--red);padding:2rem;text-align:center;">Error de conexión. Comprueba las reglas de Realtime Database.</div>';
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); }

// horas que una persona dedica a un proyecto esta semana
function hPersonaProyecto(a) {
  if (!a || !a.active) return 0;
  return (a.reunCliente||0) + (a.reunInterna||0) + (a.horasDia||0) * 5;
}

window.addPerson = () => {
  state.people.push({id:state._pid++, name:'Nueva persona', type:'senior', hours:40});
  save(); renderAll();
};
window.removePerson = id => {
  state.people = state.people.filter(p=>p.id!==id);
  state.projects.forEach(p=>{ delete p.assignations[id]; });
  save(); renderAll();
};
window.updatePerson = (id,k,v) => {
  const p = state.people.find(p=>p.id===id);
  if(p) p[k]=v;
  save(); renderDashboard();
};
window.addProject = () => {
  state.projects.push({id:state._ppid++, name:'Nuevo proyecto', assignations:{}});
  save(); renderAll();
};
window.removeProject = id => {
  state.projects = state.projects.filter(p=>p.id!==id);
  save(); renderAll();
};
window.updateProject = (id,k,v) => {
  const p = state.projects.find(p=>p.id===id);
  if(p) p[k]=v;
  save(); renderProjects(); renderDashboard();
};

// activar/desactivar persona en proyecto
window.toggleAssign = (projId, personId, checked) => {
  const p = state.projects.find(p=>p.id===projId);
  if (!p) return;
  if (!p.assignations[personId]) {
    p.assignations[personId] = {active:false, reunCliente:1, reunInterna:1, horasDia:1};
  }
  p.assignations[personId].active = checked;
  save(); renderProjects(); renderDashboard();
};

// actualizar campo de asignación
window.updateAssign = (projId, personId, key, val) => {
  const p = state.projects.find(p=>p.id===projId);
  if (!p || !p.assignations[personId]) return;
  p.assignations[personId][key] = val;
  save(); renderDashboard();
};

function renderPeople() {
  const el = document.getElementById('people-list');
  if (!state.people.length) { el.innerHTML='<div class="empty-state">No hay personas en el equipo.</div>'; return; }
  el.innerHTML = state.people.map(p=>`
    <div class="item-card">
      <div class="item-row">
        <input type="text" value="${esc(p.name)}" onchange="updatePerson(${p.id},'name',this.value)" style="width:170px;font-weight:500;">
        <select onchange="updatePerson(${p.id},'type',this.value)">
          <option value="senior" ${p.type==='senior'?'selected':''}>Empleado</option>
          <option value="intern"  ${p.type==='intern' ?'selected':''}>Becario</option>
        </select>
        <button class="del-btn" onclick="removePerson(${p.id})">Eliminar</button>
      </div>
      <div class="item-row">
        <span class="field-label">Horas disponibles/sem</span>
        <input type="number" value="${p.hours}" min="4" max="50" step="1" onchange="updatePerson(${p.id},'hours',+this.value)">
      </div>
    </div>`).join('');
}

function renderProjects() {
  const el = document.getElementById('proj-list');
  if (!state.projects.length) { el.innerHTML='<div class="empty-state">No hay proyectos.</div>'; return; }

  el.innerHTML = state.projects.map(proj => {
    // calcular total horas del proyecto sumando todas las personas activas
    const totalHProj = state.people.reduce((s,pe)=>{
      const a = proj.assignations[pe.id];
      return s + hPersonaProyecto(a);
    },0);

    const rows = state.people.map(pe => {
      const a = proj.assignations[pe.id] || {active:false, reunCliente:1, reunInterna:1, horasDia:1};
      const isActive = !!a.active;
      const h = hPersonaProyecto(a);
      return `
      <tr class="${isActive?'':'inactive'}">
        <td>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" ${isActive?'checked':''} onchange="toggleAssign(${proj.id},${pe.id},this.checked)">
            <span style="font-size:13px;">${esc(pe.name)}</span>
            <span class="badge ${pe.type==='intern'?'badge-intern':'badge-senior'}" style="font-size:9px;">${pe.type==='intern'?'Becario':'Empleado'}</span>
          </label>
        </td>
        <td>
          <input type="number" value="${a.reunCliente||1}" min="0" max="10" step="0.5"
            ${isActive?'':'disabled'}
            onchange="updateAssign(${proj.id},${pe.id},'reunCliente',+this.value)"
            title="Reunión cliente h/sem">
          <div class="assign-sub">cliente</div>
        </td>
        <td>
          <input type="number" value="${a.reunInterna||1}" min="0" max="10" step="0.5"
            ${isActive?'':'disabled'}
            onchange="updateAssign(${proj.id},${pe.id},'reunInterna',+this.value)"
            title="Reunión interna h/sem">
          <div class="assign-sub">interna</div>
        </td>
        <td>
          <input type="number" value="${a.horasDia||1}" min="0" max="8" step="0.25"
            ${isActive?'':'disabled'}
            onchange="updateAssign(${proj.id},${pe.id},'horasDia',+this.value)"
            title="Trabajo diario h/día">
          <div class="assign-sub">h/día</div>
        </td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:${isActive?'var(--text)':'var(--text3)'}">
          ${isActive ? h.toFixed(1)+'h' : '—'}
        </td>
      </tr>`;
    }).join('');

    return `
    <div class="item-card">
      <div class="item-row">
        <input type="text" value="${esc(proj.name)}" onchange="updateProject(${proj.id},'name',this.value)" style="width:200px;font-weight:500;">
        <button class="del-btn" onclick="removeProject(${proj.id})">Eliminar</button>
      </div>
      <table class="assign-table">
        <thead>
          <tr>
            <th>Persona</th>
            <th>Reun. cliente</th>
            <th>Reun. interna</th>
            <th>Trabajo/día</th>
            <th>Total/sem</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="proj-total">Total horas equipo en este proyecto: <strong>${totalHProj.toFixed(1)}h/sem</strong></div>
    </div>`;
  }).join('');
}

function renderDashboard() {
  const dash = document.getElementById('dashboard');
  const sumEl = document.getElementById('summary');
  if (!state.people.length) {
    dash.innerHTML='<div class="empty-state">Añade personas al equipo para ver el dashboard.</div>';
    sumEl.innerHTML=''; return;
  }

  let c={free:0,ok:0,warn:0,over:0};

  const cards = state.people.map(pe => {
    // sumar horas de todos los proyectos donde esta persona está activa
    const myProjects = state.projects.filter(p => {
      const a = p.assignations[pe.id];
      return a && a.active;
    });
    const tot = myProjects.reduce((s,p)=> s + hPersonaProyecto(p.assignations[pe.id]), 0);
    const cap = pe.hours;
    const pct = cap > 0 ? (tot/cap)*100 : 0;
    const pr  = Math.round(pct);
    const free = Math.max(0, cap-tot);

    let cls,label,color;
    if(pct<=70)      {cls='free';label='Con margen';  color='#378ADD';c.free++;}
    else if(pct<=90) {cls='ok';  label='Carga sana';  color='#1D9E75';c.ok++;}
    else if(pct<=105){cls='warn';label='En el límite';color='#EF9F27';c.warn++;}
    else             {cls='over';label='Saturado';    color='#E24B4A';c.over++;}

    const roleBadge = pe.type==='intern'
      ? '<span class="badge badge-intern">Becario</span>'
      : '<span class="badge badge-senior">Empleado</span>';

    const blocks = myProjects.length
      ? `<div class="proj-breakdown">${myProjects.map(p=>{
          const a = p.assignations[pe.id];
          return `<div class="proj-block">
            <div class="proj-block-name">${esc(p.name)}</div>
            <div class="proj-line"><span>Reunión cliente</span><span>${(a.reunCliente||0).toFixed(1)}h</span></div>
            <div class="proj-line"><span>Reunión interna</span><span>${(a.reunInterna||0).toFixed(1)}h</span></div>
            <div class="proj-line"><span>Trabajo diario</span><span>${((a.horasDia||0)*5).toFixed(1)}h</span></div>
            <div class="proj-line total"><span>Total</span><span>${hPersonaProyecto(a).toFixed(1)}h/sem</span></div>
          </div>`;
        }).join('')}</div>`
      : '<div style="font-size:12px;color:var(--text3);padding:.5rem 0;">Sin proyectos asignados.</div>';

    return `
    <div class="person-card">
      <div class="pc-header">
        <div>
          <div class="pc-name">${esc(pe.name)} ${roleBadge}</div>
          <div class="pc-meta">${myProjects.length} proyecto${myProjects.length!==1?'s':''} · ${tot.toFixed(1)}h ocupadas de ${cap}h</div>
          <div class="free-hours ${free>8?'highlight':''}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            ${free.toFixed(1)}h libres esta semana
          </div>
        </div>
        <div class="pc-right">
          <div class="pc-pct" style="color:${color}">${pr}%</div>
          <div style="margin-top:6px;"><span class="badge badge-${cls}">${label}</span></div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pr,100)}%;background:${color};"></div></div>
        <div class="bar-legend">
          <span>0h</span>
          <span style="color:${color};font-weight:500;">${tot.toFixed(1)} / ${cap}h</span>
          <span>${cap}h</span>
        </div>
      </div>
      ${blocks}
    </div>`;
  }).join('');

  dash.innerHTML = cards;
  sumEl.innerHTML = `
    <div class="metric"><div class="metric-val">${state.people.length}</div><div class="metric-lbl">Personas</div></div>
    <div class="metric"><div class="metric-val">${state.projects.length}</div><div class="metric-lbl">Proyectos</div></div>
    <div class="metric"><div class="metric-val c-green">${c.ok}</div><div class="metric-lbl">Carga sana</div></div>
    <div class="metric"><div class="metric-val c-amber">${c.warn}</div><div class="metric-lbl">En el límite</div></div>
    <div class="metric"><div class="metric-val c-red">${c.over}</div><div class="metric-lbl">Saturados</div></div>
    <div class="metric"><div class="metric-val c-blue">${c.free}</div><div class="metric-lbl">Con margen</div></div>`;
}

function renderAll(){ renderPeople(); renderProjects(); renderDashboard(); }
</script>
</body>
</html>
